services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ix2
      POSTGRES_PASSWORD: ix2dev
      POSTGRES_DB: ix2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ix2"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
